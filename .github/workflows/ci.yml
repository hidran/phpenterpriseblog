name: ci
on:
  pull_request: {}
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, redis, intl, mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: composer cs
      - run: composer stan
      - run: composer test

  integration:
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: phpenterpriseblog
          MYSQL_ROOT_PASSWORD: root
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: phpenterpriseblog
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DSN: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo_mysql, redis, intl, mbstring
      - uses: ramsey/composer-install@v3
      - run: php bin/console migrate
      - run: composer test:int

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # The app service bind-mounts the checkout over /var/www/html, and
      # opcache.preload needs vendor/autoload.php, so vendor/ must exist on the
      # host before the container starts (otherwise php-fpm exits 70).
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo_mysql, redis, intl, mbstring
      - uses: ramsey/composer-install@v3
      - run: docker compose up -d --wait
      - run: docker compose exec -T app php bin/console migrate
      - run: docker compose exec -T mysql mysql -uroot -proot phpenterpriseblog < database/seeds/0001_demo.sql
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: |
          cd tests/E2e
          npm ci || npm install
          npx playwright install --with-deps chromium
          npx playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/E2e/playwright-report
          if-no-files-found: ignore
