apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "fb.name" . }}-test-healthz"
  annotations: { "helm.sh/hook": test }
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["sh", "-c", "curl -fsS http://{{ include "fb.name" . }}/healthz | grep '\"db\":\"ok\"'"]
