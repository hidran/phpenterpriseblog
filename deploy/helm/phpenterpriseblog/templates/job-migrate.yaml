apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fb.name" . }}-migrate-{{ .Release.Revision }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      # No serviceAccountName: this runs as a pre-install hook, before the
      # chart's ServiceAccount exists. It only needs DB creds (from the secret),
      # not the app's identity, so the namespace default SA is fine.
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["php", "bin/console", "migrate"]
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - secretRef: { name: phpenterpriseblog-db }
          env:
            {{- range $k, $v := .Values.env }}
            - { name: {{ $k }}, value: "{{ $v }}" }
            {{- end }}
