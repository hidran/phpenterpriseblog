image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  php:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 512Mi }
  nginx:
    requests: { cpu: 20m,  memory: 32Mi  }
    limits:   { cpu: 200m, memory: 64Mi  }

service:
  port: 80

ingress:
  enabled: true
  className: alb
  hosts: []
  annotations: {}
  tls: []

probes:
  liveness:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 10
  readiness:
    httpGet: { path: /healthz, port: http }
    periodSeconds: 5

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  secrets:
    - name: phpenterpriseblog-db
      remoteRef: phpenterpriseblog/staging/db
    - name: phpenterpriseblog-redis
      remoteRef: phpenterpriseblog/staging/redis

env:
  APP_ENV: production
  APP_DEBUG: "false"
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis-tls
  LOG_CHANNEL: stderr
  LOG_LEVEL: info

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 33
  fsGroup: 33
  seccompProfile: { type: RuntimeDefault }

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: [ALL] }

serviceAccount:
  create: true
  name: phpenterpriseblog
  annotations: {}   # set IRSA role ARN at install time via values.<env>.yaml
